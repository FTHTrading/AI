# Genesis Protocol — Production Deployment
#
# Usage:
#   docker compose up -d
#
# Environment:
#   Copy .env.example to .env and set real values before deploying.

services:
  genesis:
    build: .
    container_name: genesis-apex
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"  # Bind to localhost only — Cloudflare proxies via reverse proxy
    volumes:
      - genesis-data:/home/genesis/data
    env_file:
      - .env
    environment:
      - RUST_LOG=info
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 64M
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/status"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  genesis-data:
    driver: local

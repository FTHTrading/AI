<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Genesis Protocol</title>
<style>
body{background:#111;color:#ccc;font:14px/1.8 monospace;padding:20px;max-width:900px;margin:0 auto}
h2{color:#888;font-size:14px;margin:24px 0 8px;border-bottom:1px solid #222;padding-bottom:4px}
pre{margin:0;white-space:pre-wrap}
#t{color:#555;font-size:12px;margin-bottom:16px}
</style>
</head>
<body>
<pre style="color:#888;font-size:16px;margin-bottom:4px">GENESIS PROTOCOL</pre>
<div id="t">loading...</div>
<div id="out"></div>
<script>
async function poll(){
  try{
    const r=await fetch('system-state.json?'+Date.now());
    const d=await r.json();
    const a=d.agents||[];
    const h=d.history||[];
    const last=h[h.length-1]||{};
    const tb=d.total_births||0;
    const td=d.total_deaths||0;
    const bd=td>0?(tb/td).toFixed(3):tb>0?'inf':'0';
    const l10=h.slice(-10);
    const rb=l10.reduce((s,e)=>s+e.b,0);
    const rd=l10.reduce((s,e)=>s+e.d,0);
    const rbd=rd>0?(rb/rd).toFixed(3):rb>0?'inf':'0';
    const stasis=a.filter(x=>x.contracts===0&&!x.prim).length;
    const start=d.started_at?new Date(d.started_at).toLocaleString():'?';

    let s='';

    s+=`EPOCH           ${d.epoch}\n`;
    s+=`POPULATION      ${a.length} / ${d.pop_cap} cap\n`;
    s+=`IN STASIS       ${stasis}\n`;
    s+=`TREASURY        ${(d.tr_reserve||0).toFixed(2)} ATP\n`;
    s+=`CIRCULATING     ${(last.atp||0).toFixed(1)} ATP\n`;
    s+=`SKIM RATE       ${((d.tr_skim||0)*100).toFixed(1)}%\n`;
    s+=`STIPEND         ${(d.tr_stipend||0).toFixed(1)} ATP\n`;
    s+=`COLLECTED       ${(d.tr_collected||0).toFixed(2)}\n`;
    s+=`DISTRIBUTED     ${(d.tr_distributed||0).toFixed(2)}\n`;
    s+=`\n`;
    s+=`TOTAL BIRTHS    ${tb}\n`;
    s+=`TOTAL DEATHS    ${td}\n`;
    s+=`B:D ALL TIME    ${bd}\n`;
    s+=`B:D LAST 10     ${rbd}  (${rb}b ${rd}d)\n`;
    s+=`AVG FITNESS     ${(last.mf||0).toFixed(4)}\n`;
    s+=`MAX FITNESS     ${(last.xf||0).toFixed(4)}\n`;
    s+=`STARTED         ${start}\n`;

    // agents
    s+=`\nAGENTS (${a.length})\n`;
    s+=`${'ROLE'.padEnd(14)}${'GEN'.padStart(4)}${'REP'.padStart(8)}${'CONTRACTS'.padStart(11)}${'MUT'.padStart(6)}${'BASAL'.padStart(7)}${'STATUS'.padStart(9)}\n`;
    s+=`${'-'.repeat(59)}\n`;
    const sorted=[...a].sort((x,y)=>{if(x.prim&&!y.prim)return-1;if(!x.prim&&y.prim)return 1;return y.rep-x.rep});
    for(const ag of sorted){
      const st=ag.contracts===0&&!ag.prim?'STASIS':ag.contracts<20&&!ag.prim?'NEW':'ACTIVE';
      const p=ag.prim?'*':'';
      s+=`${(p+ag.role).padEnd(14)}${String(ag.gen).padStart(4)}${ag.rep.toFixed(4).padStart(8)}${String(ag.contracts).padStart(11)}${String(ag.mut).padStart(6)}${String(ag.basal).padStart(7)}${st.padStart(9)}\n`;
    }

    // history
    s+=`\nEPOCH HISTORY (last ${h.length})\n`;
    s+=`${'EP'.padStart(6)}${'POP'.padStart(5)}${'CAP'.padStart(5)}${'B'.padStart(4)}${'D'.padStart(4)}${'ST'.padStart(4)}${'ATP'.padStart(9)}${'AVG'.padStart(8)}${'MAX'.padStart(8)}${'DECAY'.padStart(7)}${'TAX'.padStart(7)}\n`;
    s+=`${'-'.repeat(67)}\n`;
    for(let i=h.length-1;i>=0;i--){
      const e=h[i];
      s+=`${String(e.ep).padStart(6)}${String(e.pop).padStart(5)}${String(e.cap).padStart(5)}${String(e.b).padStart(4)}${String(e.d).padStart(4)}${String(e.st).padStart(4)}${e.atp.toFixed(1).padStart(9)}${e.mf.toFixed(4).padStart(8)}${e.xf.toFixed(4).padStart(8)}${e.dec.toFixed(2).padStart(7)}${e.tax.toFixed(2).padStart(7)}\n`;
    }

    document.getElementById('out').innerHTML='<pre>'+s+'</pre>';
    document.getElementById('t').textContent='updated '+new Date().toLocaleTimeString();
  }catch(e){
    document.getElementById('t').textContent='fetch failed — retrying';
  }
}
poll();
setInterval(poll,6000);
</script>
</body>
</html>
